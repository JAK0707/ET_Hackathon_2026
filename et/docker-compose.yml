version: "3.9"

services:
  db:
    image: postgres:16
    container_name: marketmind-postgres
    environment:
      POSTGRES_DB: marketmind
      POSTGRES_USER: marketmind
      POSTGRES_PASSWORD: marketmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.11-slim
    container_name: marketmind-backend
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./:/app

  frontend:
    image: node:20-alpine
    container_name: marketmind-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./:/app

volumes:
  postgres_data:
